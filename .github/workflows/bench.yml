name: bench

env:
  RUSTFLAGS: "-C target-cpu=x86-64-v3 -C target-feature=+aes,+pclmulqdq"
  CARGO_TERM_COLOR: always

on:
  push:
    branches:
      - "main"
  workflow_dispatch:
    inputs:
      filter:
        description: 'Optional filter for cargo bench (e.g., a specific benchmark name)'
        default: ''
        required: false
      ref:
        description: 'Optional git ref to benchmark'
        default: ''
        required: false

jobs:
  benchmarks:
    runs-on: "ubicloud-standard-4"
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          submodules: recursive
          ref: ${{ github.event.inputs.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Install stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        id: toolchain
        with:
          toolchain: stable

      - run: cargo --version

      - name: Install bencher
        uses: bencherdev/bencher@0f8f620172ccd6225d40a7590598eb7b41718af8 # 0.6.2

      - name: CPU information
        run: lscpu

      - name: Cache
        uses: ubicloud/rust-cache@65b3ff06b9bcc69d88c25e212f1ae3d14a0953c3

      - name: Run benchmarks
        run: |
          bencher run \
          --project cryprot \
          --token '${{ secrets.BENCHER_API_TOKEN }}' \
          --branch '${{github.ref_name}}' \
          --testbed ubicloud-standard-4 \
          --threshold-measure latency \
          --threshold-test t_test \
          --threshold-upper-boundary 0.99 \
          'cargo bench ${{ github.event.inputs.filter }}'
